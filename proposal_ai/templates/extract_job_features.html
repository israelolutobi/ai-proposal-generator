<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>Extract Job Features - ProposalIQ</title>
</head>

<body style="background-color:#0b1120; color:white; font-family:Arial; margin:0;">

<div style="max-width:900px; margin:70px auto; background-color:#111827; padding:40px; border-radius:16px; border:1px solid #1e293b;">

    <h1>Paste Job Post</h1>

    <p style="color:#cbd5e1;">
        Copy the full job post text and paste it below. ProposalIQ will extract the key job features automatically.
    </p>

    <form method="POST">
        {% csrf_token %}

        <textarea name="raw_job_text"
                  required
                  placeholder="Paste full job post here..."
                  style="width:100%; height:350px; padding:14px; border-radius:8px; border:none;"></textarea>

        <br><br>

        <button type="submit"
                style="background-color:#1e90ff; color:white; padding:16px 28px; border:none; border-radius:10px; font-weight:bold;">
            Extract Features
        </button>
    </form>

</div>

</body>
</html>
