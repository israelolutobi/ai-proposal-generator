<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>Login - ProposalIQ</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="
    background-color:#0b1120;
    color:white;
    font-family:Arial;
    margin:0;
">

<div style="
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px;
    background-color:#05070d;
    border-bottom:1px solid #1e293b;
">

    <a href="/"
       style="
            display:flex;
            align-items:center;
            text-decoration:none;
       ">

        <img src="{% static 'images/proposallogo.png' %}"
             alt="ProposalIQ Logo"
             style="
                height:55px;
                margin-right:15px;
             ">

        <h1 style="
            color:white;
            font-size:32px;
            margin:0;
            letter-spacing:2px;
        ">
            Proposal<span style="color:#1e90ff;">IQ</span>
        </h1>

    </a>

    <a href="/register/" style="
        color:white;
        text-decoration:none;
        font-size:18px;
    ">
        Register
    </a>

</div>

<div style="
    max-width:450px;
    margin:80px auto;
    background-color:#111827;
    padding:35px;
    border-radius:14px;
    border:1px solid #1e293b;
">

    <h2 style="
        font-size:32px;
        margin-top:0;
    ">
        Login
    </h2>

    {% if error_message %}
        <p style="color:#ef4444;">
            {{ error_message }}
        </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>Username</label><br>

        <input type="text"
               name="username"
               required
               style="
                    width:100%;
                    padding:12px;
                    margin:8px 0 18px;
               "><br>

        <label>Password</label><br>

        <input type="password"
               name="password"
               required
               style="
                    width:100%;
                    padding:12px;
                    margin:8px 0 25px;
               "><br>

        <button type="submit"
                style="
                    width:100%;
                    background-color:#1e90ff;
                    color:white;
                    padding:14px;
                    border:0;
                    border-radius:8px;
                    font-size:16px;
                    font-weight:bold;
                ">
            Login
        </button>

    </form>

</div>

</body>
</html>
