<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>Register - ProposalIQ</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="
    background-color:#0b1120;
    color:white;
    font-family:Arial;
    margin:0;
">

{% include "partials/public_navbar.html" %}

<div style="
    max-width:450px;
    margin:80px auto;
    background-color:#111827;
    padding:35px;
    border-radius:14px;
    border:1px solid #1e293b;
">

    <h2 style="
        margin-top:0;
        font-size:32px;
    ">
        Create your account
    </h2>

    {% if error_message %}

        <p style="color:#ef4444;">
            {{ error_message }}
        </p>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>Username</label><br>

        <input
            type="text"
            name="username"
            required
            style="
                width:100%;
                padding:12px;
                margin:8px 0 18px;
                border:none;
                border-radius:8px;
            "
        ><br>

        <label>Email</label><br>

        <input
            type="email"
            name="email"
            required
            style="
                width:100%;
                padding:12px;
                margin:8px 0 18px;
                border:none;
                border-radius:8px;
            "
        ><br>

        <label>Password</label><br>

        <input
            type="password"
            name="password"
            required
            style="
                width:100%;
                padding:12px;
                margin:8px 0 18px;
                border:none;
                border-radius:8px;
            "
        ><br>

        <label>Confirm Password</label><br>

        <input
            type="password"
            name="confirm_password"
            required
            style="
                width:100%;
                padding:12px;
                margin:8px 0 25px;
                border:none;
                border-radius:8px;
            "
        ><br>

        <button
            type="submit"
            style="
                width:100%;
                background-color:#1e90ff;
                color:white;
                padding:14px;
                border:none;
                border-radius:8px;
                font-size:16px;
                font-weight:bold;
                cursor:pointer;
            "
        >
            Register
        </button>

    </form>

    <p style="
        text-align:center;
        margin-top:25px;
        color:#cbd5e1;
    ">

        Already have an account?

        <a href="/login/"
           style="
                color:#1e90ff;
                text-decoration:none;
                font-weight:bold;
           ">

            Login here

        </a>

    </p>

</div>

</body>
</html>
