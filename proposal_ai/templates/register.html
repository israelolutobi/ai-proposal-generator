<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>Register - ProposalIQ</title>
</head>

<body style="background-color:#0b1120; color:white; font-family:Arial; margin:0;">

<div style="display:flex; align-items:center; justify-content:space-between; padding:20px; background-color:#05070d; border-bottom:1px solid #1e293b;">

    <a href="{% if user.is_authenticated %}/dashboard/{% else %}/{% endif %}"
       style="display:flex; align-items:center; text-decoration:none;">

        <img src="{% static 'images/proposallogo.png' %}"
             style="height:55px; margin-right:15px;">

        <h1 style="color:white; font-size:32px; margin:0;">
            Proposal<span style="color:#1e90ff;">IQ</span>
        </h1>
    </a>

</div>

<div style="max-width:450px; margin:80px auto; background-color:#111827; padding:35px; border-radius:14px;">

    <h2>Create your account</h2>

    {% if error_message %}
        <p style="color:red;">{{ error_message }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>Username</label><br>
        <input type="text" name="username" required style="width:100%; padding:12px;"><br><br>

        <label>Email</label><br>
        <input type="email" name="email" required style="width:100%; padding:12px;"><br><br>

        <label>Password</label><br>
        <input type="password" name="password" required style="width:100%; padding:12px;"><br><br>

        <label>Confirm Password</label><br>
        <input type="password" name="confirm_password" required style="width:100%; padding:12px;"><br><br>

        <button type="submit" style="width:100%; background-color:#1e90ff; color:white; padding:14px; border:none; border-radius:8px;">
            Register
        </button>

    </form>

</div>

</body>
</html>
</html>
