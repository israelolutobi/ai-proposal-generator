<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>Create Profile - ProposalIQ</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="background-color:#0b1120; color:white; font-family:Arial; margin:0;">

<div style="display:flex; align-items:center; justify-content:space-between; padding:20px; background-color:#05070d; border-bottom:1px solid #1e293b;">

    <a href="/dashboard/" style="display:flex; align-items:center; text-decoration:none;">
        <img src="{% static 'images/proposallogo.png' %}" alt="ProposalIQ Logo" style="height:55px; margin-right:15px;">

        <h1 style="color:white; font-size:32px; margin:0; letter-spacing:2px;">
            Proposal<span style="color:#1e90ff;">IQ</span>
        </h1>
    </a>

    <div style="display:flex; gap:20px; align-items:center;">

        <span style="color:#cbd5e1; font-size:16px;">
            {{ user.username }}
        </span>

        <form method="POST" action="/logout/" style="margin:0;">
            {% csrf_token %}

            <button type="submit" style="
                background:none;
                border:none;
                color:#ef4444;
                font-size:18px;
                cursor:pointer;
            ">
                Logout
            </button>
        </form>

    </div>

</div>

<div style="
    max-width:700px;
    margin:60px auto;
    background-color:#111827;
    padding:40px;
    border-radius:16px;
    border:1px solid #1e293b;
">

    <h2 style="
        margin-top:0;
        font-size:36px;
    ">
        Create Your Freelancer Profile
    </h2>

    <p style="
        color:#cbd5e1;
        margin-bottom:35px;
        line-height:1.6;
    ">
        Set up your basic freelancer identity first. You will add structured work experience after this step.
    </p>

    <form method="POST">

        {% csrf_token %}

        <input type="hidden"
               name="next"
               value="{{ next_page }}">

        <label>Professional Title</label><br>

        <input type="text"
               name="professional_title"
               value="{{ profile.professional_title|default:'' }}"
               placeholder="e.g. Python Backend Developer"
               style="
                    width:100%;
                    padding:14px;
                    margin-top:8px;
                    margin-bottom:25px;
                    border-radius:8px;
                    border:none;
               "><br>

        <label>Profile Summary</label><br>

        <textarea name="profile_summary"
                  placeholder="Briefly describe who you are, the services you offer, and the type of work you want to win."
                  style="
                        width:100%;
                        padding:14px;
                        height:160px;
                        margin-top:8px;
                        margin-bottom:25px;
                        border-radius:8px;
                        border:none;
                  ">{{ profile.profile_summary|default:'' }}</textarea><br>

        <label>Preferred Proposal Tone</label><br>

        <input type="text"
               name="preferred_tone"
               value="{{ profile.preferred_tone|default:'' }}"
               placeholder="Professional, confident, conversational..."
               style="
                    width:100%;
                    padding:14px;
                    margin-top:8px;
                    margin-bottom:35px;
                    border-radius:8px;
                    border:none;
               "><br>

        <button type="submit"
                style="
                    background-color:#1e90ff;
                    color:white;
                    padding:16px 28px;
                    border:none;
                    border-radius:10px;
                    font-size:16px;
                    font-weight:bold;
                    cursor:pointer;
                ">
            Continue
        </button>

    </form>

</div>

</body>
</html>
