<!DOCTYPE html>
<html>

{% load static %}

<head>

    <title>{{ page_title }} - ProposalIQ</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body style="background-color:#0b1120; color:white; font-family:Arial; margin:0;">

{% include "partials/navbar.html" %}

<div style="max-width:850px; margin:60px auto;">

    <div style="
        background-color:#111827;
        padding:40px;
        border-radius:16px;
        border:1px solid #1e293b;
    ">

        <h2 style="
            margin-top:0;
            font-size:38px;
        ">
            {{ page_title }}
        </h2>

        <p style="
            color:#cbd5e1;
            line-height:1.6;
            margin-bottom:35px;
        ">
            {{ page_description }}
        </p>

        <form method="POST">

            {% csrf_token %}

            <input type="hidden"
                   name="next"
                   value="{{ next_page|default:'' }}">

            <label>Professional Title</label><br>

            <input
                type="text"
                name="professional_title"
                value="{{ profile.professional_title|default:'' }}"
                placeholder="e.g. Python Backend Developer"
                required
                style="
                    width:100%;
                    padding:14px;
                    margin-top:8px;
                    margin-bottom:25px;
                    border-radius:8px;
                    border:none;
                "
            ><br>

            <label>Profile Summary</label><br>

            <textarea
                name="profile_summary"
                required
                placeholder="Describe your experience, strengths and what makes you a good freelancer..."
                style="
                    width:100%;
                    height:180px;
                    padding:14px;
                    margin-top:8px;
                    margin-bottom:25px;
                    border-radius:8px;
                    border:none;
                "
            >{{ profile.profile_summary|default:'' }}</textarea><br>

            <label>Preferred Proposal Tone</label><br>

            <select
                name="preferred_tone"
                style="
                    width:100%;
                    padding:14px;
                    margin-top:8px;
                    margin-bottom:35px;
                    border-radius:8px;
                    border:none;
                ">

                <option value="professional"
                    {% if profile.preferred_tone == "professional" %}selected{% endif %}>
                    Professional
                </option>

                <option value="friendly"
                    {% if profile.preferred_tone == "friendly" %}selected{% endif %}>
                    Friendly
                </option>

                <option value="confident"
                    {% if profile.preferred_tone == "confident" %}selected{% endif %}>
                    Confident
                </option>

                <option value="technical"
                    {% if profile.preferred_tone == "technical" %}selected{% endif %}>
                    Technical
                </option>

            </select>

            <div style="
                display:flex;
                gap:15px;
                flex-wrap:wrap;
            ">

                <a href="/dashboard/"
                   style="
                        background-color:#334155;
                        color:white;
                        padding:16px 26px;
                        border-radius:10px;
                        text-decoration:none;
                        font-weight:bold;
                   ">

                    Dashboard

                </a>

                <a href="/my-experiences/"
                   style="
                        background-color:#1e293b;
                        color:white;
                        padding:16px 26px;
                        border-radius:10px;
                        text-decoration:none;
                        font-weight:bold;
                   ">

                    My Experiences

                </a>

                <button
                    type="submit"
                    style="
                        background-color:#1e90ff;
                        color:white;
                        padding:16px 28px;
                        border:none;
                        border-radius:10px;
                        font-size:16px;
                        font-weight:bold;
                        cursor:pointer;
                    ">

                    {{ button_text }}

                </button>

            </div>

        </form>

    </div>

</div>

</body>

</html>
