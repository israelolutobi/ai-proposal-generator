{% load static %}

<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background-color:#05070d;
    border-bottom:1px solid #1e293b;
">

    <!-- ProposalIQ Logo -->

    <a href="/"
       style="
            display:flex;
            align-items:center;
            text-decoration:none;
       ">

        <img
            src="{% static 'images/proposallogo.png' %}"
            alt="ProposalIQ Logo"
            style="
                height:55px;
                margin-right:15px;
            "
        >

        <h1 style="
            margin:0;
            color:white;
            font-size:32px;
            letter-spacing:2px;
        ">
            Proposal<span style="color:#1e90ff;">IQ</span>
        </h1>

    </a>

    <!-- Public Navigation -->

    <div style="
        display:flex;
        align-items:center;
        gap:25px;
    ">

        <a href="/"
           style="
                color:white;
                text-decoration:none;
                font-weight:bold;
           ">
            Home
        </a>

        <a href="/login/"
           style="
                color:white;
                text-decoration:none;
                font-weight:bold;
           ">
            Login
        </a>

        <a href="/register/"
           style="
                background-color:#1e90ff;
                color:white;
                padding:10px 18px;
                border-radius:8px;
                text-decoration:none;
                font-weight:bold;
           ">
            Register
        </a>

    </div>

</div>
