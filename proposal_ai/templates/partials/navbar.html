{% load static %}

<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background-color:#05070d;
    border-bottom:1px solid #1e293b;
">

    <!-- Logo -->

    <a href="{% url 'dashboard' %}"
       style="
            display:flex;
            align-items:center;
            text-decoration:none;
       ">

        <img
            src="{% static 'images/proposallogo.png' %}"
            style="
                height:55px;
                margin-right:15px;
            "
        >

        <h1 style="
            margin:0;
            color:white;
        ">
            Proposal<span style="color:#1e90ff;">IQ</span>
        </h1>

    </a>

    <!-- Navigation -->

    <div style="
        display:flex;
        align-items:center;
        gap:25px;
    ">

        <a href="{% url 'dashboard' %}"
           style="
                color:#1e90ff;
                text-decoration:none;
                font-weight:bold;
           ">

            Dashboard

        </a>

        <a href="{% url 'my_experiences' %}"
           style="
                color:white;
                text-decoration:none;
           ">

            My Experience

        </a>

        <a href="{% url 'create_freelancer_profile' %}"
           style="
                color:white;
                text-decoration:none;
           ">

            Profile

        </a>

        <form
            method="POST"
            action="{% url 'logout' %}"
            style="margin:0;"
        >

            {% csrf_token %}

            <button
                type="submit"
                style="
                    background:#dc2626;
                    color:white;
                    border:none;
                    padding:10px 18px;
                    border-radius:8px;
                    cursor:pointer;
                    font-weight:bold;
                "
            >

                Logout

            </button>

        </form>

    </div>

</div>
